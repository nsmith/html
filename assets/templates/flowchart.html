<!DOCTYPE html>
<!--
  TEMPLATE: Annotated Flowchart
  Use case: An interactive deploy-pipeline flowchart. Each step is a clickable
  node; selecting one shows its timing, command/path, and notes in a detail panel.

  HOW TO USE
  1. Edit the <title> and the header text below.
  2. Edit the STEPS array in the <script> at the bottom — each entry becomes a
     node in the flowchart and drives the detail panel. Set kind to:
       "process"  (rectangle), "decision" (diamond), or "terminal" (pill).
     Set status to "success", "fail", or "" (neutral) to color the connector.
  3. Search for "REPLACE:" comments for the spots most worth customizing.
  Everything is self-contained: no external CSS, JS, fonts, or images.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- REPLACE: page title -->
<title>Deploy Pipeline &mdash; Annotated Flowchart</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c232d;
    --line: #2a323d;
    --text: #e6edf3;
    --muted: #97a3b3;
    --accent: #5b9dff;
    --success: #3fb950;
    --fail: #f85149;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 80% -10%, #18222f 0%, var(--bg) 55%);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }

  header.page { margin-bottom: 24px; }
  header.page h1 { font-size: clamp(1.5rem, 3vw, 2.1rem); margin: 0 0 6px; letter-spacing: -0.02em; }
  header.page p { margin: 0; color: var(--muted); max-width: 60ch; }

  .legend { display: flex; flex-wrap: wrap; gap: 14px 20px; margin: 18px 0 28px; font-size: 0.82rem; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--line); }
  .swatch.proc { background: var(--panel-2); }
  .swatch.dec { background: var(--panel-2); transform: rotate(45deg); border-radius: 2px; }
  .swatch.term { background: var(--panel-2); border-radius: 999px; }
  .swatch.ok { background: var(--success); border-color: var(--success); }
  .swatch.no { background: var(--fail); border-color: var(--fail); }

  .layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }

  /* Flow */
  .flow { display: flex; flex-direction: column; gap: 0; }
  .node-row { display: flex; flex-direction: column; align-items: center; }
  .connector { width: 2px; height: 28px; background: var(--line); position: relative; }
  .connector.success { background: linear-gradient(var(--line), var(--success)); }
  .connector.fail { background: linear-gradient(var(--line), var(--fail)); }
  .connector::after {
    content: ""; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent;
    border-top: 6px solid var(--line);
  }
  .connector.success::after { border-top-color: var(--success); }
  .connector.fail::after { border-top-color: var(--fail); }

  .node {
    position: relative;
    width: 100%; max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    color: inherit; font: inherit; text-align: left;
    display: flex; align-items: center; gap: 14px;
    transition: border-color .15s, transform .12s, background .15s, box-shadow .15s;
  }
  .node:hover { border-color: #3b4856; background: var(--panel-2); transform: translateY(-1px); }
  .node:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,157,255,.35); }
  .node[aria-current="true"] {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,.35);
    background: var(--panel-2);
  }
  .node.decision { max-width: 380px; border-style: dashed; }
  .node.terminal { max-width: 320px; border-radius: 999px; }

  .node .icon { flex: 0 0 auto; display: grid; place-items: center; width: 34px; height: 34px; }
  .node .meta { min-width: 0; flex: 1; }
  .node .label { font-weight: 600; font-size: 0.97rem; }
  .node .sub { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node .time { flex: 0 0 auto; font-family: var(--mono); font-size: 0.74rem; color: var(--muted); background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
  .dot { width: 9px; height: 9px; border-radius: 999px; flex: 0 0 auto; }
  .dot.success { background: var(--success); }
  .dot.fail { background: var(--fail); }
  .dot.neutral { background: var(--muted); }

  /* Detail panel */
  .panel {
    position: sticky; top: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    min-height: 280px;
  }
  .panel h2 { margin: 0 0 2px; font-size: 1.15rem; letter-spacing: -0.01em; }
  .panel .kind-tag { display: inline-block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; margin-bottom: 14px; }
  .panel dl { margin: 0; }
  .panel dt { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-top: 16px; }
  .panel dd { margin: 4px 0 0; }
  .panel dd.path { font-family: var(--mono); font-size: 0.82rem; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; overflow-x: auto; }
  .panel .desc { color: var(--text); }
  .panel .status-line { display: inline-flex; align-items: center; gap: 7px; font-size: 0.85rem; }
  .panel .hint { color: var(--muted); font-size: 0.85rem; }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .panel { position: static; }
    .node { max-width: none !important; }
  }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">

  <header class="page">
    <!-- REPLACE: headline + description -->
    <h1>Deploy Pipeline</h1>
    <p>From <code>git push</code> to production. Click any step to see what runs, how long it takes, and where it can short-circuit.</p>
  </header>

  <div class="legend" aria-hidden="true">
    <span><i class="swatch proc"></i> Process</span>
    <span><i class="swatch dec"></i> Decision</span>
    <span><i class="swatch term"></i> Terminal</span>
    <span><i class="swatch ok"></i> Success path</span>
    <span><i class="swatch no"></i> Failure path</span>
  </div>

  <div class="layout">
    <!-- Flowchart nodes are generated from the STEPS array below -->
    <main class="flow" id="flow" aria-label="Deploy pipeline steps"></main>

    <aside class="panel" id="panel" aria-live="polite" aria-label="Step details">
      <p class="hint">Select a step in the flow to view its details.</p>
    </aside>
  </div>
</div>

<script>
  // REPLACE: define your pipeline here. Order = top-to-bottom in the chart.
  //   kind:   "process" | "decision" | "terminal"
  //   status: "success" | "fail" | ""   (colors the connector below the node)
  //   time:   short badge shown on the node (e.g. "~2 min")
  //   path:   command / file / URL shown in the detail panel
  //   notes:  free-text explanation
  const STEPS = [
    {
      id: "trigger", kind: "terminal", status: "", time: "0s",
      label: "git push → main", sub: "Pipeline trigger",
      path: "on: push: { branches: [main] }",
      notes: "A push to the default branch starts the workflow. Forks and draft PRs do not trigger a deploy."
    },
    {
      id: "ci", kind: "process", status: "success", time: "~2 min",
      label: "Lint & typecheck", sub: "Static checks",
      path: ".github/workflows/ci.yml → lint",
      notes: "Runs ESLint and the type checker in parallel. Fails fast on any error before tests start."
    },
    {
      id: "test", kind: "process", status: "success", time: "~6 min",
      label: "Run test suite", sub: "Unit + integration, 3 shards",
      path: "npm test -- --shard=$i/3",
      notes: "Tests are split across 3 runners. A single failing shard fails the whole stage."
    },
    {
      id: "build", kind: "process", status: "success", time: "~3 min",
      label: "Build image", sub: "Docker → registry",
      path: "ghcr.io/acme/web:${SHA}",
      notes: "Builds and pushes a tagged container image. Layers are cached between runs."
    },
    {
      id: "gate", kind: "decision", status: "success", time: "manual",
      label: "Approve deploy?", sub: "Required reviewer",
      path: "environment: production (protected)",
      notes: "Production requires one approval. On reject, the run stops here with no changes shipped."
    },
    {
      id: "canary", kind: "process", status: "success", time: "10 min soak",
      label: "Canary 5%", sub: "Progressive rollout",
      path: "argocd app set web --canary 5",
      notes: "Routes 5% of traffic to the new version and watches error rate and latency before promoting."
    },
    {
      id: "smoke", kind: "decision", status: "fail", time: "90s",
      label: "Smoke tests pass?", sub: "Playwright against canary",
      path: "npx playwright test --grep @smoke",
      notes: "If critical flows break, the rollout auto-aborts and traffic returns to the previous version."
    },
    {
      id: "rollback", kind: "terminal", status: "", time: "<30s",
      label: "Auto-rollback", sub: "Failure path",
      path: "argocd app rollback web",
      notes: "Triggered when smoke tests fail. Restores the last healthy revision and pages the on-call."
    },
    {
      id: "promote", kind: "terminal", status: "", time: "~8 min",
      label: "Promote to 100%", sub: "Deploy complete",
      path: "argocd app promote web",
      notes: "Steps traffic 25% → 50% → 100%. Once stable, the deploy is marked successful."
    }
  ];

  const flow = document.getElementById("flow");
  const panel = document.getElementById("panel");
  const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

  function iconFor(kind) {
    // Inline SVG only — no external images.
    if (kind === "decision") {
      return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M12 3l9 9-9 9-9-9z"/></svg>';
    }
    if (kind === "terminal") {
      return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3" y="7" width="18" height="10" rx="5"/></svg>';
    }
    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="3"/></svg>';
  }

  function statusDot(status) {
    const cls = status === "success" ? "success" : status === "fail" ? "fail" : "neutral";
    return '<span class="dot ' + cls + '" aria-hidden="true"></span>';
  }

  function render() {
    const frag = document.createDocumentFragment();
    STEPS.forEach((step, i) => {
      const row = document.createElement("div");
      row.className = "node-row";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "node " + step.kind;
      btn.id = "node-" + step.id;
      btn.dataset.index = i;
      btn.setAttribute("aria-current", "false");
      btn.innerHTML =
        '<span class="icon">' + iconFor(step.kind) + '</span>' +
        '<span class="meta">' +
          '<span class="label">' + statusDot(step.status) + ' ' + esc(step.label) + '</span>' +
          '<span class="sub">' + esc(step.sub || "") + '</span>' +
        '</span>' +
        (step.time ? '<span class="time">' + esc(step.time) + '</span>' : '');

      btn.addEventListener("click", () => select(i));
      row.appendChild(btn);

      // Connector below every node except the last
      if (i < STEPS.length - 1) {
        const conn = document.createElement("div");
        conn.className = "connector" + (step.status ? " " + step.status : "");
        conn.setAttribute("aria-hidden", "true");
        row.appendChild(conn);
      }
      frag.appendChild(row);
    });
    flow.appendChild(frag);
  }

  function select(i) {
    const step = STEPS[i];
    document.querySelectorAll(".node").forEach(n => n.setAttribute("aria-current", "false"));
    const active = document.getElementById("node-" + step.id);
    active.setAttribute("aria-current", "true");
    active.focus({ preventScroll: true });

    const kindLabel = { process: "Process step", decision: "Decision point", terminal: "Terminal state" }[step.kind] || "Step";
    const statusText = step.status === "success" ? "Success path"
      : step.status === "fail" ? "Failure path" : "Neutral";

    panel.innerHTML =
      '<span class="kind-tag">' + esc(kindLabel) + '</span>' +
      '<h2>' + esc(step.label) + '</h2>' +
      '<p class="status-line">' + statusDot(step.status) + ' ' + esc(statusText) + '</p>' +
      (step.time ? '<dt>Typical timing</dt><dd>' + esc(step.time) + '</dd>' : '') +
      (step.path ? '<dt>Command / path</dt><dd class="path">' + esc(step.path) + '</dd>' : '') +
      (step.notes ? '<dt>Notes</dt><dd class="desc">' + esc(step.notes) + '</dd>' : '');
  }

  // Keyboard: arrow up/down moves between steps when a node is focused.
  flow.addEventListener("keydown", (e) => {
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    const focused = document.activeElement;
    if (!focused.classList || !focused.classList.contains("node")) return;
    e.preventDefault();
    let idx = Number(focused.dataset.index);
    idx += e.key === "ArrowDown" ? 1 : -1;
    idx = Math.max(0, Math.min(STEPS.length - 1, idx));
    select(idx);
  });

  render();
  select(0); // Show the first step's details on load
</script>
</body>
</html>
